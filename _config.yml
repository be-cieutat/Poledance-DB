
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

title: My Polebook
email: redstoneword+pole@gmail.com
description: >- # this means to ignore newlines until "baseurl:"
  I've recently started poledance classes, 
  and I was looking for a way to store and display figures I'm learning, 
  so that I can share it with my friends easily.

baseurl: "/Poledance-DB"
url: "https://be-cieutat.github.io"

# Build settings
theme: minimal-mistakes-jekyll
minimal_mistakes_skin: "mint"

collections:
  moves:
    output: true
    permalink: /moves/:path/
  sessions:
    output: true
    permalink: /sessions/:path/

defaults:
  - scope:
      path: ""
      type: moves
    values:
      layout: moves
  - scope:
      path: ""
      type: sessions
    values:
      layout: sessions

progress_users:
  - Boyan
  - Morgane
  - Victoria
  - Lucile


