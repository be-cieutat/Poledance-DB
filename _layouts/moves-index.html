---
layout: default
---
<style>
  .moves-wrap {
    --ink: #14120F;
    --chalk: #F1EDE4;
    --brass: #C8A15C;
    --spot: #E8447A;
    --steel: #78746C;
    background: var(--ink);
    padding: 2.5rem 4vw 4rem;
  }
  .moves-title {
    font-family: "Bebas Neue", sans-serif;
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    color: var(--chalk);
    margin: 0 0 2rem;
    letter-spacing: 0.02em;
  }
  .moves-grid {
    column-count: 4;
    column-gap: 1rem;
  }
  @media (max-width: 1100px) { .moves-grid { column-count: 3; } }
  @media (max-width: 760px)  { .moves-grid { column-count: 2; } }
  @media (max-width: 480px)  { .moves-grid { column-count: 1; } }

  .move-card {
    display: block;
    break-inside: avoid;
    margin-bottom: 1rem;
    position: relative;
    border-radius: 6px;
    overflow: hidden;
    text-decoration: none;
    background: #1c1a16;
    border: 1px solid rgba(241,237,228,0.06);
    transition: transform 0.18s ease, border-color 0.18s ease;
  }
  .move-card:hover {
    transform: translateY(-3px);
    border-color: var(--brass);
  }
  .move-card img {
    width: 100%;
    display: block;
  }
  .move-card__overlay {
    position: absolute; left: 0; right: 0; bottom: 0;
    padding: 0.9rem 0.9rem 0.7rem;
    background: linear-gradient(to top, rgba(20,18,15,0.92), transparent);
  }
  .move-card__title {
    font-family: "Bebas Neue", sans-serif;
    font-size: 1.5rem;
    color: var(--chalk);
    letter-spacing: 0.02em;
    line-height: 1;
    margin: 0 0 0.4rem;
  }
  .move-card__meta {
    display: flex; gap: 0.4rem; align-items: center;
    font-family: "IBM Plex Mono", monospace;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .move-card__meta span { color: var(--steel); }
  .move-card__meta .diff { color: var(--spot); }
</style>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<div class="moves-wrap">
  <h1 class="moves-title">Moves</h1>
  <div class="moves-grid">
    {% assign sorted_moves = site.moves | sort: "date_learned" | reverse %}
    {% for move in sorted_moves %}
      <a class="move-card" href="{{ move.url | relative_url }}">
        <img src="{{ move.hero_image | relative_url }}" alt="{{ move.title }}" loading="lazy">
        <div class="move-card__overlay">
          <h2 class="move-card__title">{{ move.title }}</h2>
          <div class="move-card__meta">
            <span>{{ move.category }}</span>
            <span>·</span>
            <span class="diff">{{ move.difficulty_label }}</span>
          </div>
        </div>
      </a>
    {% endfor %}
  </div>
</div>
